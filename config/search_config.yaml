# RLM Beam Search Configuration

models:
  planner_model: "claude-haiku-4-5-20251001"      # planner agent
  coder_model: "claude-haiku-4-5-20251001"        # code generation agent
  fixer_model: "claude-haiku-4-5-20251001"        # repair agent for compile/below-baseline failures
  root_model: "claude-haiku-4-5-20251001"         # decomposition
  sub_model: "claude-haiku-4-5-20251001"          # codegen
  combine_model: "claude-haiku-4-5-20251001"      # combination

beam:
  width: 1                    # parallel strategy variants
  refine_rounds: 0            # profiler feedback iterations
  max_sub_calls_per_round: 2  # cap recursive depth
  combine_top_k: 2            # merge top-K into final
  diversity_mode: "family_diverse"  # preserve distinct strategy families
  tree_speedup_threshold: 1.0 # once a branch clears baseline, expand it via planner tree
  tree_branching_factor: 2    # child branches created from above-baseline parents
  family_retire_gap: 0.25     # retire plateaued families if they trail the leader by this much
  family_retire_ratio: 0.80   # retire plateaued families if they trail the leader by this ratio
  plateau_refine_attempts: 2  # require at least two failed refinements before retiring a family
  plateau_bad_rounds: 2       # require repeated stagnant/regression outcomes before pruning
  max_concurrent_api_calls: 4 # keep planner/coder parallelism aligned with beam width
  population_crossover: true  # inject one family-distinct crossover candidate per round
  early_stop_min_improvement: 0.03  # stop if round-over-round best speedup improves by less than this

strategies:
  enabled:
    - vectorize_loads
    - tma_prefetch
    - warp_reduction
    - fuse_passes
    - register_tiling
    - async_pipeline
    - fp4_lut
    - fast_math_expf
    - thread_coarsening
    - ldg_readonly
    - vectorized_stores
  disabled: []

profiler:
  tool: "hybrid"
  warmup_iters: 3
  profile_iters: 10
  max_profile_workers: 2

cost_control:
  max_tokens_per_sub_call: 8192
  max_total_api_cost_usd: 25.0  # hard stop per kernel problem (Opus is ~5x Sonnet)
  max_total_cost_all_problems: 100.0

target:
  min_speedup: 1.5               # target speedup over baseline

rag:
  provider: "pinecone"
  index_name: "cuda-kernels-v2"
  index_host: "cuda-kernels-v2-69jsi4r.svc.aped-4627-b74a.pinecone.io"
  top_k: 4
  candidate_pool_multiplier: 5
  namespace_env: "PINECONE_NAMESPACE"
  api_key_env: "PINECONE_API_KEY"
  index_name_env: "PINECONE_INDEX_NAME"
  index_host_env: "PINECONE_INDEX_HOST"
  embed_provider_env: "PINECONE_EMBED_PROVIDER"
  embed_model_env: "PINECONE_EMBED_MODEL"
  rerank_model_env: "PINECONE_RERANK_MODEL"
  rerank_pool: 25
  source_cap: 1
  format_max_chars: 16000
  match_max_chars: 4000
  text_field: "source_code"
  title_field: "title"
  source_field: "source"
  fields:
    - "source_code"
    - "chunk_text"
    - "title"
    - "source"
    - "source_file"
    - "hardware_target"
    - "optimization_pattern"
    - "op_type"

eval:
  require_flashinfer_baseline: true
  correctness_atol: 1e-2
  correctness_rtol: 1e-3
  correctness_seeds: [42, 123, 999]
  benchmark_warmup: 500
  benchmark_iters: 100
  # Shapes are now per-task (passed via problem_shape in run.py).
  # These are fallback defaults only — not used during normal WaferBench runs.
  problem_shapes:
    - [128, 2048]    # add_rmsnorm_fp4quant_b128xh2048
    - [128, 4096]    # add_rmsnorm_fp4quant_b128xh4096
    - [128, 8192]    # add_rmsnorm_fp4quant_b128xh8192

output:
  save_all_candidates: true
  save_profiler_reports: true
  output_dir: "outputs/"
  log_level: "INFO"
